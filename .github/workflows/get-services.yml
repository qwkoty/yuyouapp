name: Get Render Services
on:
  workflow_dispatch:

jobs:
  get-services:
    runs-on: ubuntu-latest
    steps:
      - name: Get services
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            https://api.render.com/v1/services
