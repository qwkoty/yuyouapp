services:
  - type: web
    name: yuyou
    runtime: node
    plan: free
    rootDir: .
    buildCommand: |
      npm ci
      cd packages/shared && npm run build
      cd ../../apps/web && npm run build
      cd ../server && npm run build
      mkdir -p ./dist/web
      cp -r ../web/dist/* ./dist/web/
    startCommand: cd apps/server && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://yuyou.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: yuyou-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: yuyou-redis
          property: connectionString

databases:
  - name: yuyou-db
    plan: free

redis:
  - name: yuyou-redis
    plan: free
    ipAllowList: []
