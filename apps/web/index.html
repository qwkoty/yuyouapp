<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>遇友 - 限时破冰</title>
    <style>
      /* ⚡ 内联首屏 loading，避免白屏等待 JS 加载 */
      html, body { margin: 0; padding: 0; background: #0a0a0f; }
      #root { min-height: 100vh; }
      #app-loading {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background: #0a0a0f;
        z-index: 9999; transition: opacity 0.3s;
      }
      #app-loading.hide { opacity: 0; pointer-events: none; }
      .app-loader-spin {
        width: 48px; height: 48px; border: 3px solid rgba(139,92,246,0.15);
        border-top-color: #8b5cf6; border-radius: 50%;
        animation: appSpin 0.8s linear infinite;
      }
      @keyframes appSpin { to { transform: rotate(360deg); } }
      #app-loading p {
        margin-top: 16px; color: #6b7280; font-size: 14px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- ⚡ 首屏 loading：在 React hydrate 前就显示，消除白屏感 -->
      <div id="app-loading">
        <div class="app-loader-spin"></div>
        <p>加载中...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
